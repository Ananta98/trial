name: Application Flow

on:
  issues:
    types: [opened]
  pull_request:
    types: [closed]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  ask-for-pr:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    steps:
      - name: Comment with PR instructions
        uses: actions/github-script@v6
        with:
          script: |
            const issue = context.payload.issue;
            const candidate = issue.user.login;
            const body = `# 🎉 Thank you for your application!

Welcome @${candidate}! We're excited to review your submission.

## ✅ What's next?
1. Familiarize yourself with our [guidelines](https://github.com/holdex/developers/blob/main/.github/CONTRIBUTING.md).
1. Execute the trial by submitting two pull requests:
   - **PR #1:** add your profile information to the repository (`profile-submission.json`).
   - **PR #2:** complete the task we'll provide after your profile PR is merged.
1. Follow our social channels (feel free to tweet about us!):
   - [Holdex X](https://x.com/HoldexIo)
   - [LinkedIn](https://www.linkedin.com/company/holdex)

## How to submit your profile
1. Fork this repo.
2. Edit `profile-submission.json` using the template below:
```json
{
  "github_handle": "your_github_username",
  "full_name": "Your Name",
  "github_trial_issue_link": "https://github.com/holdex/trial/issues/${issue.number}"
}
```
3. Open a pull request and **link it to this issue** (e.g. include `closes #${issue.number}` in the description).

Once your PR is merged, we'll re‑open this issue and send you the trial instructions.

> If you have any questions, reply here or mention us.``;
            try {
              await github.issues.createComment({ ...context.repo, issue_number: issue.number, body });
            } catch (err) {
              console.log('Unable to post initial comment:', err.message);
            }
            try {
              await github.issues.addLabels({ ...context.repo, issue_number: issue.number, labels: ['job-application'] });
            } catch (e) {
              console.log('Could not add label:', e.message);
            }

  reopen-issue:
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Reopen linked issues and ask to proceed
        uses: actions/github-script@v6
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';
            const refs = [...body.matchAll(/#(\d+)/g)].map(m => parseInt(m[1], 10));
            const uniq = [...new Set(refs)];
            if (uniq.length === 0) {
              console.log('No issue references found in PR body. Skipping reopen.');
            }
            for (const issue_number of uniq) {
              try {
                await github.issues.update({ ...context.repo, issue_number, state: 'open' });
                const comment = `Hi — your profile PR (#${pr.number}) was merged. Please proceed with the trial task described in your original application. If you need the trial instructions again, reply here or mention us.`;
                await github.issues.createComment({ ...context.repo, issue_number, body: comment });
              } catch (e) {
                console.log(`Failed to reopen/comment on issue #${issue_number}:`, e.message);
              }
            }
